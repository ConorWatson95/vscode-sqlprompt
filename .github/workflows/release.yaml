name: Release Extension

on:
  push:
    branches:
      - main
    paths:
      - client/**
      - server/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump extension version
        id: version
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          if [ -n "$RUN_NUMBER" ]; then
            TARGET_VERSION="0.1.${RUN_NUMBER}"
          else
            TARGET_VERSION="$CURRENT_VERSION"
          fi

          if [ "$CURRENT_VERSION" != "$TARGET_VERSION" ]; then
            npm version "$TARGET_VERSION" --no-git-tag-version
          fi

          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build extension
        run: npm run compile

      - name: Package VSIX
        run: printf 'y\n' | npx @vscode/vsce package --out vscode-sqlprompt.vsix

      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --packagePath vscode-sqlprompt.vsix -p "$VSCE_PAT"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-sqlprompt-${{ steps.version.outputs.version }}-vsix
          path: vscode-sqlprompt.vsix

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): bump version to ${{ steps.version.outputs.version }}"

      - name: Create release tag
        run: git tag "${{ steps.version.outputs.tag }}"

      - name: Push release commit and tag
        run: |
          git push origin HEAD:${GITHUB_REF_NAME}
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: vscode-sqlprompt.vsix
