name: Release Extension

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version bump for this release
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump extension version
        id: version
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
        run: |
          npm version "${RELEASE_TYPE}" --no-git-tag-version
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build extension
        run: npm run compile

      - name: Prune dev dependencies
        run: |
          npm --prefix client prune --omit=dev
          npm --prefix server prune --omit=dev

      - name: Package VSIX
        run: printf 'y\n' | npx @vscode/vsce package --out vscode-sqlprompt.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-sqlprompt-${{ steps.version.outputs.version }}-vsix
          path: vscode-sqlprompt.vsix

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): bump version to ${{ steps.version.outputs.version }}"

      - name: Create release tag
        run: git tag "${{ steps.version.outputs.tag }}"

      - name: Push release commit and tag
        run: |
          git push origin HEAD:${GITHUB_REF_NAME}
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: vscode-sqlprompt.vsix
